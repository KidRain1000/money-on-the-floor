<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Basketball court lines -->
  <circle cx="600" cy="315" r="120" fill="none" stroke="#ff6b35" stroke-width="3" opacity="0.3"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#ff6b35" stroke-width="2" opacity="0.2"/>

  <!-- Basketball icon -->
  <circle cx="600" cy="240" r="80" fill="#ff6b35"/>
  <path d="M520 240 Q600 200 680 240" fill="none" stroke="#1a1a2e" stroke-width="4"/>
  <path d="M520 240 Q600 280 680 240" fill="none" stroke="#1a1a2e" stroke-width="4"/>
  <line x1="600" y1="160" x2="600" y2="320" stroke="#1a1a2e" stroke-width="4"/>

  <!-- Dollar sign on basketball -->
  <text x="600" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#1a1a2e">$</text>

  <!-- Title -->
  <text x="600" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#ffffff">MONEY ON THE FLOOR</text>

  <!-- Subtitle -->
  <text x="600" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#a0a0a0">NBA Matchup Analyzer • Injuries • Salary Impact</text>

  <!-- Bottom accent -->
  <rect x="400" y="520" width="400" height="4" rx="2" fill="#ff6b35"/>
</svg>
